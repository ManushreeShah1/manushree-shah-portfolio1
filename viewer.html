<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Viewer — Manushree Shah</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Manrope', -apple-system, BlinkMacSystemFont, sans-serif;
    color: #111;
    background: #fff;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    display: flex;
    flex-direction: column;
  }
  a { color: inherit; text-decoration: none; }

  /* ---------- Top bar ---------- */
  .topbar {
    background: #f5f5f4;
    border-bottom: 1px solid rgba(0,0,0,0.07);
    padding: 0 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    flex-shrink: 0;
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
    font-weight: 600;
    color: #111;
    cursor: pointer;
    background: none;
    border: none;
    font-family: inherit;
    transition: opacity .2s;
  }
  .back-btn:hover { opacity: 0.6; }
  .back-arrow { font-size: 18px; line-height: 1; }

  .topbar-center { text-align: center; }
  .topbar-title { font-size: 15px; font-weight: 700; letter-spacing: -0.01em; }
  .topbar-sub {
    font-size: 11px; color: #8a8a8a; letter-spacing: 0.04em; text-transform: uppercase;
    margin-top: 2px;
  }
  .topbar-logo { font-size: 14px; font-weight: 700; color: #111; }

  /* ---------- PDF viewer ---------- */
  .viewer-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: #1a1a1a;
    min-height: 0;
  }
  .viewer-frame {
    flex: 1;
    width: 100%;
    border: none;
    min-height: calc(100vh - 64px);
  }

  /* ---------- Loading / not found ---------- */
  .loading, .not-found {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    gap: 16px;
    color: #ccc;
    min-height: calc(100vh - 64px);
    text-align: center;
    padding: 40px;
  }
  .loading-spinner {
    width: 36px; height: 36px;
    border: 3px solid rgba(255,255,255,0.1);
    border-top-color: #C7222A;
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .not-found h2 { font-size: 22px; font-weight: 700; }
  .not-found p { font-size: 14px; line-height: 1.6; max-width: 360px; color: #999; }
  .not-found a {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 14px; font-weight: 600; color: #e8d9b9;
    border-bottom: 1px solid rgba(232,217,185,0.3); padding-bottom: 2px;
  }

  /* ---------- Image / architecture viewer ---------- */
  .image-viewer-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    background: #f5f5f4;
    min-height: calc(100vh - 64px);
    max-height: calc(100vh - 64px);
    overflow-y: auto;
    padding: 20px 40px;
    position: relative;
    gap: 14px;
  }
  .image-stage {
    display: flex;
    align-items: center;
    gap: 16px;
    width: 100%;
    max-width: 1300px;
    justify-content: center;
    flex: 1;
    min-height: 0;
  }
  .img-nav-btn {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: #fff;
    border: 1.5px solid #e5e3df;
    color: #111;
    font-size: 20px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all .2s;
    flex-shrink: 0;
  }
  .img-nav-btn:hover { background: #C7222A; color: #fff; border-color: #C7222A; }
  .img-nav-btn:disabled { opacity: 0.3; cursor: default; }
  .img-nav-btn:disabled:hover { background: #fff; color: #111; border-color: #e5e3df; }
  .image-frame {
    background: #fff;
    border-radius: 4px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.12);
    padding: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    min-width: 0;
    max-width: 100%;
    max-height: 100%;
  }
  .image-frame img {
    display: block;
    border-radius: 2px;
    max-width: 100%;
    /* leave room for topbar + caption + dots + padding so nothing gets cropped */
    max-height: calc(100vh - 240px);
    width: auto;
    height: auto;
    object-fit: contain;
  }
  .image-caption {
    text-align: center;
    flex-shrink: 0;
  }
  .image-caption .cap-label {
    font-size: 13px;
    font-weight: 700;
    color: #C7222A;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .image-caption .cap-desc {
    font-size: 13px;
    color: #6b6b6b;
    margin-top: 4px;
    max-width: 560px;
  }
  .image-dots {
    display: flex; gap: 8px; justify-content: center;
    flex-shrink: 0;
  }
  .image-dot {
    width: 8px; height: 8px; border-radius: 50%; background: #d6d4cf;
    transition: background .2s, width .2s;
    cursor: pointer;
  }
  .image-dot.active { background: #C7222A; width: 22px; border-radius: 4px; }

  @media (max-width: 700px) {
    .topbar { padding: 0 16px; }
    .topbar-logo { display: none; }
    .image-viewer-wrap { padding: 14px 12px; gap: 10px; }
    .image-stage { gap: 6px; }
    .img-nav-btn { width: 34px; height: 34px; font-size: 15px; }
    .image-frame img { max-height: calc(100vh - 200px); }
    .image-caption .cap-desc { display: none; }
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar" id="topbar">
  <button class="back-btn" onclick="window.location.href='index.html#works'">
    <span class="back-arrow">←</span> Back to Portfolio
  </button>
  <div class="topbar-center">
    <div class="topbar-title" id="v-title">Loading…</div>
    <div class="topbar-sub" id="v-tag"></div>
  </div>
  <div class="topbar-logo">Manushree Shah</div>
</div>

<!-- CONTENT -->
<div id="content" style="flex:1; display:flex; flex-direction:column; min-height:0;">
  <div class="loading">
    <div class="loading-spinner"></div>
    <p>Loading…</p>
  </div>
</div>

<script>
  // ---------------------------------------------------------------
  // DATA — edit paths / links here
  // ---------------------------------------------------------------
  const items = {

    // Research papers — embedded straight from Google Drive.
    'paper1': {
      title: 'Evaluating Predictive Maintenance with Multiclass Categorical Data Constraints',
      tag: 'Springer',
      type: 'pdf',
      url: 'https://drive.google.com/file/d/1fEEKtrJRoxnsm57QDFZE9uDSLiwKn0Uw/preview'
    },
    'paper2': {
      title: 'AI-Enabled Automated Inspection of Reinforced Concrete Cement (RCC)',
      tag: 'IEEE',
      type: 'pdf',
      url: 'https://drive.google.com/file/d/1KuYdmkFAi4UaIbnqge7V5JeQ06fX1Qsj/preview'
    },
    'paper3': {
      title: 'Automating Data Manipulation Tasks in MS Excel using Gemini & Llama LLMs',
      tag: 'IEEE',
      type: 'pdf',
      url: 'https://drive.google.com/file/d/1fuqDgrDLcZlejoMIH-CAZnkzyWb-LKUa/preview'
    },

    // RAG bot — served from your own /static folder.
    // TODO: replace this filename with your actual PDF in /static
    'ragbot': {
      title: 'RAG-Based Investor Education Chatbot',
      tag: 'RAG',
      type: 'pdf',
      url: 'static/RAG-based-bot.pdf'
    },

    // Project architecture image galleries — each is [overview, architecture].
    // TODO: replace these filenames with your actual images in /static
     'pitchlens': {
      title: 'PitchLens — Voice-Enabled AI Sales Coaching Platform',
      tag: 'GenAI',
      type: 'images',
      images: [
        { src: 'static/IMG_9046.png', label: 'Overview', desc: 'What PitchLens does and the problem it solves.' },
        { src: 'static/IMG_9041.jpeg', label: 'Architecture', desc: 'End-to-end system architecture and data flow.' }
      ]
    },
    'preraidar': {
      title: 'Pre-Raidar — Compliance & Investor Intelligence Dashboard',
      tag: 'Fintech',
      type: 'images',
      images: [
        { src: 'static/IMG_9047.png', label: 'Overview', desc: 'What Pre-Raidar does and the problem it solves.' },
        { src: 'static/IMG_9036.png', label: 'Architecture', desc: 'End-to-end system architecture and data flow.' }
      ]
    },
    'agentic': {
      title: 'Agentic Financial Planning Bot (LangGraph)',
      tag: 'Agentic AI',
      type: 'images',
      images: [
        { src: 'static/agentic-overview.png', label: 'Overview', desc: 'What the agentic bot does and the problem it solves.' },
        { src: 'static/pic-agent.png', label: 'Architecture', desc: 'LangGraph-based agent architecture and data flow.' }
      ]
    }
  };

  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  const forcedType = params.get('type');
  const item = items[id];

  const titleEl = document.getElementById('v-title');
  const tagEl = document.getElementById('v-tag');
  const content = document.getElementById('content');

  function renderNotFound() {
    titleEl.textContent = 'Not Found';
    tagEl.textContent = '';
    content.innerHTML = `
      <div class="not-found">
        <h2>We couldn't find that</h2>
        <p>This item doesn't exist or the link may be broken.</p>
        <a href="index.html#works">← Return to portfolio</a>
      </div>`;
  }

  function renderPdf(url) {
    content.innerHTML = `
      <div class="viewer-wrap">
        <iframe class="viewer-frame" src="${url}" allow="autoplay" allowfullscreen></iframe>
      </div>`;
  }

  function renderImages(images) {
    let current = 0;

    content.innerHTML = `
      <div class="image-viewer-wrap">
        <div class="image-stage">
          <button class="img-nav-btn" id="prevBtn" aria-label="Previous">‹</button>
          <div>
            <div class="image-frame">
              <img id="stageImg" src="" alt="">
            </div>
            <div class="image-caption">
              <div class="cap-label" id="capLabel"></div>
              <div class="cap-desc" id="capDesc"></div>
            </div>
          </div>
          <button class="img-nav-btn" id="nextBtn" aria-label="Next">›</button>
        </div>
        <div class="image-dots" id="imgDots"></div>
      </div>`;

    const stageImg = document.getElementById('stageImg');
    const capLabel = document.getElementById('capLabel');
    const capDesc = document.getElementById('capDesc');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const dotsWrap = document.getElementById('imgDots');

    images.forEach((_, i) => {
      const dot = document.createElement('span');
      dot.className = 'image-dot' + (i === 0 ? ' active' : '');
      dot.addEventListener('click', () => show(i));
      dotsWrap.appendChild(dot);
    });

    function show(i) {
      current = Math.max(0, Math.min(images.length - 1, i));
      const img = images[current];
      stageImg.src = img.src;
      stageImg.alt = img.label;
      capLabel.textContent = img.label;
      capDesc.textContent = img.desc || '';
      prevBtn.disabled = current === 0;
      nextBtn.disabled = current === images.length - 1;
      dotsWrap.querySelectorAll('.image-dot').forEach((d, idx) => d.classList.toggle('active', idx === current));
    }

    prevBtn.addEventListener('click', () => show(current - 1));
    nextBtn.addEventListener('click', () => show(current + 1));

    show(0);
  }

  if (!item) {
    renderNotFound();
  } else {
    titleEl.textContent = item.title;
    tagEl.textContent = item.tag;

    const type = forcedType || item.type;

    if (type === 'pdf') {
      renderPdf(item.url);
    } else if (type === 'images') {
      renderImages(item.images);
    } else {
      renderNotFound();
    }
  }
</script>
</body>
</html>
